    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #slideshow-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #slideshow-btn:hover {
            background-color: #0056b3;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
    .gallery img:hover {
            transform: scale(1.05);
        }
        /* Lightbox styles */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .lightbox .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .lightbox .prev, .lightbox .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
        .lightbox .prev { left: 20px; }
        .lightbox .next { right: 20px; }
    </style>
</head>

        images.forEach((img, index) => {
            const imgElement = document.createElement('img');
            imgElement.src = `images/${img}`;
            imgElement.alt = img;
            imgElement.addEventListener('click', () => openLightbox(index));
            gallery.appendChild(imgElement);
        });

        // Lightbox functionality
        let currentIndex = 0;
        let slideshowInterval = null;
        let isSlideshow = false;
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const slideshowBtn = document.getElementById('slideshow-btn');

        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = `images/${images[currentIndex]}`;
            lightbox.style.display = 'flex';
            if (isSlideshow) startSlideshow();
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            stopSlideshow();
            isSlideshow = false;
            slideshowBtn.textContent = 'Start Slideshow';
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            lightboxImg.src = `images/${images[currentIndex]}`;
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            lightboxImg.src = `images/${images[currentIndex]}`;
        }

        function startSlideshow() {
            if (slideshowInterval) clearInterval(slideshowInterval);
            slideshowInterval = setInterval(nextImage, 3000); // Change image every 3 seconds
        }

        function stopSlideshow() {
            if (slideshowInterval) {
                clearInterval(slideshowInterval);
                slideshowInterval = null;
            }
        }

        slideshowBtn.addEventListener('click', () => {
            if (isSlideshow) {
                stopSlideshow();
                isSlideshow = false;
                slideshowBtn.textContent = 'Start Slideshow';
            } else {
                isSlideshow = true;
                slideshowBtn.textContent = 'Stop Slideshow';
                openLightbox(0); // Start from first image
            }
        });

        document.querySelector('.close').addEventListener('click', closeLightbox);
        document.querySelector('.next').addEventListener('click', nextImage);
        document.querySelector('.prev').addEventListener('click', prevImage);

        // Close on background click
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'Escape') closeLightbox();
                else if (e.key === 'ArrowRight') nextImage();
                else if (e.key === 'ArrowLeft') prevImage();
                else if (e.key === ' ') { // Spacebar to pause/play
                    e.preventDefault();
                    if (isSlideshow) {
                        stopSlideshow();
                    } else {
                        startSlideshow();
                    }
                }
            }
        });
